version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 5
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tanstack:
        patterns:
          - "@tanstack/*"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 5
    groups:
      axum:
        patterns:
          - "axum"
          - "axum-*"
          - "tower"
          - "tower-*"
          - "hyper"
          - "hyper-*"
      tokio:
        patterns:
          - "tokio"
          - "tokio-*"
          - "futures*"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pip"
    directory: "/shim"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 5
    groups:
      fastapi:
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "starlette"
          - "pydantic*"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # docker + github-actions only honour `default-days` — the semver-*
  # keys silently break parsing for these ecosystems, so they're omitted.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
