<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Closed book outline -->
  <rect x="12" y="10" width="40" height="44" rx="2"
        stroke="#525252" stroke-width="3" fill="none" stroke-linejoin="round"/>
  <!-- Spine groove -->
  <line x1="18" y1="12" x2="18" y2="52" stroke="#525252" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Warm dot — speaker cone replaced by the family accent -->
  <circle cx="27" cy="32" r="3.5" fill="#f78f08"/>
  <!-- Audio ripples opening right from the dot -->
  <path d="M34 27 A 6 6 0 0 1 34 37" stroke="#525252" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M40 23 A 11 11 0 0 1 40 41" stroke="#525252" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
